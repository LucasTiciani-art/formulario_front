
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Formulário simples</title>
    <meta name="description" content="Exemplo de formulário simples com tags básicas" />
  </head>
  <body>
    <header>
      <h1>Formulário simples</h1>
    </header>

    <main>
      <p>Preencha os campos abaixo e envie o formulário. Este é um exemplo com tags básicas de formulário.</p>

      <form id="simpleForm" action="#" method="post">
        <div>
          <label for="nome">Nome</label><br />
          <input id="nome" name="nome" type="text" placeholder="Seu nome" required />
        </div>

        <div>
          <label for="email">Email</label><br />
          <input id="email" name="email" type="email" placeholder="seu@exemplo.com" required />
        </div>

        <div>
          <label for="genero">Gênero</label><br />
          <select id="genero" name="genero">
            <option value="">-- selecione --</option>
            <option value="f">Feminino</option>
            <option value="m">Masculino</option>
            <option value="o">Outro</option>
          </select>
        </div>

        <fieldset>
          <legend>Preferências</legend>
          <label>
            <input type="checkbox" name="newsletter" value="sim" /> Receber newsletter
          </label>
        </fieldset>

        <fieldset>
          <legend>Contato preferido</legend>
          <label><input type="radio" name="contato" value="email" checked /> Email</label>
          <label><input type="radio" name="contato" value="telefone" /> Telefone</label>
        </fieldset>

        <div>
          <label for="mensagem">Mensagem</label><br />
          <textarea id="mensagem" name="mensagem" rows="4" placeholder="Digite sua mensagem aqui..."></textarea>
        </div>

        <div>
          <button type="submit">Enviar</button>
          <button type="reset">Limpar</button>
        </div>
      </form>
    </main>

    <footer>
      <p>só uma mensagem de rodapé bem de boa aqui ó</p>
    </footer>
  </body>
</html>
